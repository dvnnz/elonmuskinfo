<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isaac Newton Info</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Video Background ── */
    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: 0;
      opacity: 0.85;
    }

    /* Subtle vignette overlay */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
    }

    /* ── Center Piece ── */
    .center-piece {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeInUp 1.8s ease-out;
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Apple + Rotating Text Container ── */
    .logo-container {
      position: relative;
      width: 340px;
      height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .apple-logo {
      width: 180px;
      height: auto;
      filter: drop-shadow(0 0 40px rgba(180, 30, 30, 0.3))
              drop-shadow(0 0 80px rgba(0, 0, 0, 0.5));
      z-index: 2;
      position: relative;
    }

    /* ── Rotating Circular Text ── */
    .rotating-text {
      position: absolute;
      width: 340px;
      height: 340px;
      animation: spin 20s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .rotating-text text {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 700;
      fill: #fff;
      letter-spacing: 3.5px;
      text-transform: uppercase;
    }

    /* ── Outer glow ring ── */
    .glow-ring {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 60px rgba(255, 255, 255, 0.03),
                  inset 0 0 60px rgba(255, 255, 255, 0.02);
      animation: pulseRing 4s ease-in-out infinite;
    }

    @keyframes pulseRing {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.03); }
    }

    /* ── Site Title ── */
    .site-title {
      margin-top: 48px;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
      animation: fadeIn 2.5s ease-out 0.5s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── Enter Button ── */
    .enter-btn {
      margin-top: 32px;
      padding: 14px 48px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: rgba(255, 255, 255, 0.8);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 6px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s ease;
      animation: fadeIn 2.5s ease-out 0.8s both;
    }

    .enter-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.5);
      color: #fff;
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.08);
      letter-spacing: 8px;
    }

    /* ── Floating Particles (subtle) ── */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      z-index: 2;
      pointer-events: none;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Video Background -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="space-bg.mp4" type="video/mp4">
  </video>

  <!-- Vignette Overlay -->
  <div class="vignette"></div>

  <!-- Floating Particles -->
  <div class="particle" style="left:10%; animation-duration:12s; animation-delay:0s;"></div>
  <div class="particle" style="left:25%; animation-duration:15s; animation-delay:2s;"></div>
  <div class="particle" style="left:40%; animation-duration:10s; animation-delay:4s;"></div>
  <div class="particle" style="left:55%; animation-duration:14s; animation-delay:1s;"></div>
  <div class="particle" style="left:70%; animation-duration:11s; animation-delay:3s;"></div>
  <div class="particle" style="left:85%; animation-duration:13s; animation-delay:5s;"></div>
  <div class="particle" style="left:15%; animation-duration:16s; animation-delay:6s;"></div>
  <div class="particle" style="left:60%; animation-duration:9s; animation-delay:2s;"></div>

  <!-- Center Piece -->
  <div class="center-piece">
    <div class="logo-container">
      <!-- Glow Ring -->
      <div class="glow-ring"></div>

      <!-- Rotating Circular Text -->
      <svg class="rotating-text" viewBox="0 0 340 340">
        <defs>
          <path id="circlePath"
            d="M 170,170 m -130,0 a 130,130 0 1,1 260,0 a 130,130 0 1,1 -260,0" />
        </defs>
        <text>
          <textPath href="#circlePath" startOffset="0%">
            issac newton • physicist • astronomer • mathematician •
          </textPath>
        </text>
      </svg>

      <!-- Apple Logo -->
      <img src="apple-logo.png" alt="Newton Apple" class="apple-logo" />
    </div>

    <!-- Title -->
    <div class="site-title">issacnewtoninfo.com</div>

    <!-- Enter Button -->
    <button class="enter-btn" onclick="window.location.href='portal.html'">Enter</button>
  </div>

</body>
</html>
